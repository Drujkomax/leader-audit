# Статический сайт leaderaudit.uz на VPS: /opt/leaderaudit/docker-compose.yml
# (кладётся рядом с /opt/leaderaudit/site — синком репозитория).
# Caddy (/opt/proxy/Caddyfile) проксирует leaderaudit.uz/www → leaderaudit-web.
services:
  web:
    image: nginx:1.27-alpine
    container_name: leaderaudit-web
    restart: unless-stopped
    volumes:
      - ./site/deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./site:/site:ro
    networks:
      - leaderaudit-net

  rebuild:
    image: node:22
    container_name: leaderaudit-rebuild
    restart: unless-stopped
    working_dir: /app
    command: ["node", "deploy/rebuild-server.mjs"]
    environment:
      VITE_API_URL: https://api.leaderaudit.uz
      CONTENT_API_URL: http://leaderaudit-api:8787
      npm_config_update_notifier: "false"
    volumes:
      - ./site:/app
    networks:
      - leaderaudit-net

networks:
  leaderaudit-net:
    external: true
    name: leaderaudit-net
