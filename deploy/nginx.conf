# ---------------------------------------------------------------------------
# Leader Audit — nginx config for Contabo (or any plain VPS).
# Mirrors vercel.json: cleanUrls, trailingSlash:false, www->non-www, legacy
# redirects, security + cache headers, gzip. Serves the static prerendered
# output of `npm run build` (the dist/ directory).
#
# Deploy:
#   1) npm run build            # produces dist/
#   2) copy dist/ to the server, e.g. /var/www/leaderaudit
#   3) put this file at /etc/nginx/sites-available/leaderaudit and symlink to
#      sites-enabled, set server_name + TLS (certbot), then: nginx -t && systemctl reload nginx
# ---------------------------------------------------------------------------

# Redirect www -> non-www (and http -> https once TLS is set up by certbot).
server {
    listen 80;
    listen [::]:80;
    server_name www.leaderaudit.uz;
    return 301 https://leaderaudit.uz$request_uri;
}

server {
    # After certbot runs, it converts this to listen 443 ssl and adds the cert lines.
    listen 80;
    listen [::]:80;
    server_name leaderaudit.uz;

    root /var/www/leaderaudit/dist;
    index index.html;

    # gzip (Vercel does this automatically; here we do it explicitly)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml application/ld+json;

    # --- Security headers (mirror vercel.json) ---
    # IMPORTANT: nginx does NOT inherit add_header into a location that declares its own
    # add_header. So NO location below uses add_header — caching uses `expires` and
    # content-types use `charset`/`default_type`/mime.types (none of which reset
    # add_header inheritance), guaranteeing these security headers reach EVERY response.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self' https://formspree.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://formspree.io; object-src 'none'; upgrade-insecure-requests" always;

    # UTF-8 charset for text responses (does not reset add_header inheritance)
    charset utf-8;
    charset_types text/plain text/css text/xml application/json application/javascript application/manifest+json image/svg+xml;

    # --- cleanUrls — redirect /index.html -> / and /path/index.html, /path.html -> /path ---
    location = /index.html { return 301 /; }
    location ~ ^/(.*)/index\.html$ { return 301 /$1; }
    location ~ ^/(.*)\.html$ { return 301 /$1; }

    # --- trailingSlash:false — strip trailing slash (except root) ---
    rewrite ^/(.*)/$ /$1 permanent;

    # --- Legacy path redirects (mirror vercel.json) ---
    rewrite ^/tpost/.*$ /blog permanent;
    rewrite ^/uz/tpost/.*$ /uz/blog permanent;
    rewrite ^/en/tpost/.*$ /en/blog permanent;
    rewrite ^/runews(/.*)?$ /blog permanent;
    rewrite ^/uznews(/.*)?$ /uz/blog permanent;
    rewrite ^/ennews(/.*)?$ /en/blog permanent;

    # --- Immutable hashed assets (expires, not add_header, so security headers inherit) ---
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # --- Static media: long cache (busted via ?v=) ---
    location ~* \.(png|jpg|jpeg|webp|avif|svg|ico|woff2)$ {
        expires 1y;
        try_files $uri =404;
    }

    # Content-types come from mime.types + charset above; sitemap gets a short cache.
    location = /sitemap.xml  { expires 1h; }
    location = /site.webmanifest { default_type application/manifest+json; }

    # --- cleanUrls: serve /path from /path/index.html. No SPA catch-all: every route is
    #     prerendered, so an unknown path must hard-404 (avoids soft-404 + duplicate home). ---
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # --- Real 404 status with the prerendered 404 page ---
    error_page 404 /404.html;
    location = /404.html { internal; }
}
